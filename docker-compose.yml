services:
  mysql:
    image: mysql:8.0
    container_name: jwt-auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: jwt_auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jwt-auth-net

  app:
    build: .
    image: jwt-auth-api:latest
    container_name: jwt-auth-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/jwt_auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-please-override-me-with-a-long-random-secret-in-production}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - jwt-auth-net

volumes:
  mysql_data:

networks:
  jwt-auth-net:
    driver: bridge
